<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>style link achor tag and button html</title>
</head>
<style>
    .container{
        border: 2px solid orangered;
        background-color: mediumaquamarine;
        padding: 34px;
        margin: 34px auto;
        width: 666px;
    }
    a {
        text-decoration: none;
        color: black;
    }
    a:hover{
        color: black;
        background-color: peachpuff;
    }
    a:visited{
        background-color: purple;
    }
    a:active{
        background-color: darkblue;
    }
    .btn{
        font-family: sans-serif;
        font-weight: bold;
        background-color: darkblue;
        padding: 6px;
        border: none;
        cursor: pointer;
        font-size: 13px;
        border-radius: 4px;
    }
</style>
<body>
    <div class="container">
        <h3>HEADING</h3>
        <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Neque quae nostrum consequatur</p>
        <a href="https://www.zomato.com/" target="_blank" class="btn">Read More</a>
        <button class="btn">Contact Us</button>
    </div>
</body>
</html>
